spring:
  application:
    name: homestyler-api
  config:
    import: optional:application-secrets.yml # 로컬 전용 OAuth 시크릿 (gitignore, 없으면 무시)
  # Jackson 3 (Spring Boot 4) 는 java.time 값을 기본적으로 ISO-8601 문자열로 직렬화한다.
  servlet:
    multipart:
      # 실제 20MB 제한은 SupabaseFileStorage 에서 VALID_002 로 검증. 여기선 컨트롤러 도달을 위해 여유를 둔다.
      max-file-size: 21MB
      max-request-size: 25MB
  # Supabase(PostgreSQL) 단일 DB. 직접 연결(db.xxx.supabase.co)은 IPv6 전용이라
  # IPv4 전용망에서 접속이 안 될 수 있어 Supavisor 커넥션 풀러(IPv4)를 기본값으로 쓴다.
  # 비밀번호는 환경변수 필수 (기본값 없음 — 커밋 금지).
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres}
    username: ${DB_USERNAME:postgres.runiohbhyhtsdnqqbzfk}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # prod 에선 JPA_DDL_AUTO=validate 로 override (스키마 자동변경 차단). 로컬 기본 update.
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# CORS 허용 오리진 — 로컬 기본 localhost 임의 포트. prod 는 CORS_ALLOWED_ORIGINS 로 실도메인 지정(쉼표 구분).
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

# 파일 스토리지 — Supabase Storage 단일 버킷. service-role-key 는 환경변수 필수 (기본값 없음 — 커밋 금지).
supabase:
  url: https://runiohbhyhtsdnqqbzfk.supabase.co
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: uploads

# JWT — JWT_SECRET 환경변수 필수 (DB_PASSWORD 와 동일, 기본값 없음). 미설정 시 부팅 실패.
# 로컬은 application-secrets.yml 또는 환경변수로 주입. 이 시크릿은 파일 서빙 HMAC 서명에도 재사용됨.
jwt:
  secret: ${JWT_SECRET}
  access-ttl-seconds: 3600      # accessToken 1시간
  refresh-ttl-seconds: 2592000  # refreshToken 30일
  cookie-secure: ${JWT_COOKIE_SECURE:false}

# 소셜 로그인 — rest-api-key/client-secret 은 application-secrets.yml(로컬) 또는
# OAUTH_KAKAO_REST_API_KEY 등 환경변수(prod)로 주입. redirect-uri 는 공개 값이라 기본값 포함.
oauth:
  kakao:
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/callback/kakao}
  google:
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/oauth/callback/google}
