spring:
  application:
    name: homestyler-api
  profiles:
    default: dev
  # Jackson 3 (Spring Boot 4) 는 java.time 값을 기본적으로 ISO-8601 문자열로 직렬화한다.
  servlet:
    multipart:
      # 실제 20MB 제한은 LocalFileStorage 에서 VALID_002 로 검증. 여기선 컨트롤러 도달을 위해 여유를 둔다.
      max-file-size: 21MB
      max-request-size: 25MB

server:
  port: 8080

# 파일 스토리지 (dev: 로컬 파일시스템). prod 는 오브젝트 스토리지 어댑터로 교체.
storage:
  local:
    dir: uploads

# JWT — dev 기본값은 git 에 노출된 값이므로 dev 전용. prod 는 application-prod.yml 이 JWT_SECRET 환경변수를 강제한다.
jwt:
  secret: ${JWT_SECRET:homestyler-dev-secret-key-please-change-in-prod-0123456789abcdef}
  access-ttl-seconds: 3600      # accessToken 1시간
  refresh-ttl-seconds: 2592000  # refreshToken 30일
  # refreshToken httpOnly 쿠키의 Secure 플래그 (dev 는 http 라 false, prod 는 prod.yml 에서 true)
  cookie-secure: ${JWT_COOKIE_SECURE:false}
