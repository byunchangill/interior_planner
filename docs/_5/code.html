<script>
        const container = document.getElementById('comparison-container');
        const afterImage = document.getElementById('after-image-clip');
        const handle = document.getElementById('slider-handle');

        let isResizing = false;

        const updateSlider = (x) => {
            const rect = container.getBoundingClientRect();
            let position = ((x - rect.left) / rect.width) * 100;
            
            // Boundary checks
            if (position < 0) position = 0;
            if (position > 100) position = 100;

            afterImage.style.clipPath = `inset(0 0 0 ${position}%)`;
            handle.style.left = `${position}%`;
        };

        const startResizing = () => {
            isResizing = true;
        };

        const stopResizing = () => {
            isResizing = false;
        };

        const onMove = (e) => {
            if (!isResizing) return;
            const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            updateSlider(x);
        };

        handle.addEventListener('mousedown', startResizing);
        window.addEventListener('mouseup', stopResizing);
        window.addEventListener('mousemove', onMove);

        handle.addEventListener('touchstart', startResizing);
        window.addEventListener('touchend', stopResizing);
        window.addEventListener('touchmove', onMove);

        // Initial animation
        setTimeout(() => {
            let start = 50;
            let target = 30;
            let current = start;
            const animate = () => {
                if (current > target) {
                    current -= 0.5;
                    updateSlider((container.getBoundingClientRect().left + (container.offsetWidth * current / 100)));
                    requestAnimationFrame(animate);
                }
            };
            // animate(); // Uncomment to have a gentle entrance animation
        }, 500);
    </script>
