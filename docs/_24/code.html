<style>

<p class="font-body-md text-body-md text-on-surface-variant max-w-xl">

            </p>
</section>
<!-- Grid Container -->

<!-- Living Room -->

</button>
<!-- Bedroom -->

</div>
<!-- Decorative AI Insight Card -->
<div class="mt-12 glass-card rounded-2xl p-6 border-primary/10 relative overflow-hidden">
<div class="absolute -right-10 -top-10 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="relative z-10 flex items-start gap-4">

                        공간 유형을 선택하면 해당 공간의 특성에 맞는 조명 배치와 가구 추천 알고리즘이 활성화됩니다. 사진 촬영 시에는 공간 전체가 잘 보이도록 넓은 각도에서 촬영해 주세요.

</a>

<span class="font-label-sm text-label-sm">더보기</span>
</a>

<script>
        function selectSpace(element) {
            // Remove active state from all cards
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('active-state');
                card.querySelector('div').classList.replace('bg-primary', 'bg-primary-container/10');
                card.querySelector('div').classList.replace('text-white', 'text-primary');
                card.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            });

            // Add active state to clicked card
            element.classList.add('active-state');
            const iconContainer = element.querySelector('div');
            iconContainer.classList.replace('bg-primary-container/10', 'bg-primary');
            iconContainer.classList.replace('text-primary', 'text-white');
            element.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";

            // Enable action button
            const nextBtn = document.getElementById('nextStep');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('bg-primary', 'hover:bg-primary/90');
        }
    </script>
