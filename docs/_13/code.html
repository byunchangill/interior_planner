<span class="material-symbols-outlined text-primary text-[20px]">settings</span>
                링크 설정
            </h4>
<!-- Expiration Settings -->
<div class="mb-6">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-3">만료 기간 설정</p>
<div class="flex gap-2">
<button class="flex-1 py-2 rounded-lg border border-primary bg-primary-container text-on-primary-container font-label-md transition-all active:scale-95" id="exp-7">7일</button>
<button class="flex-1 py-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-md hover:bg-surface-container-low transition-all active:scale-95" id="exp-30">30일</button>
<button class="flex-1 py-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-md hover:bg-surface-container-low transition-all active:scale-95" id="exp-none">제한 없음</button>

</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:opacity-80 transition-transform duration-200">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm">마이</span>
</div>

<script>
        // Micro-interactions for expiration buttons
        const expButtons = [
            document.getElementById('exp-7'),
            document.getElementById('exp-30'),
            document.getElementById('exp-none')
        ];

        expButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                expButtons.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary');
                    b.classList.add('border-outline-variant', 'text-on-surface-variant');
                });
                btn.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary');
                btn.classList.remove('border-outline-variant', 'text-on-surface-variant');
            });
        });

        // Copy button toast simulation
        const copyBtn = document.querySelector('main button.bg-primary');
        copyBtn.addEventListener('click', () => {
            copyBtn.textContent = '완료!';
            setTimeout(() => {
                copyBtn.textContent = '복사';
            }, 2000);
        });
    </script>
