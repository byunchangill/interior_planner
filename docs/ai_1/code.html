<!DOCTYPE html><html class="light" lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HomeStyler - AI 분석 중</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#191c1d",
                      "surface-container-high": "#e7e8e9",
                      "inverse-primary": "#c3c0ff",
                      "tertiary-container": "#934e00",
                      "on-primary-fixed-variant": "#3323cc",
                      "outline-variant": "#c7c4d8",
                      "on-error": "#ffffff",
                      "on-primary-container": "#dad7ff",
                      "error": "#ba1a1a",
                      "on-secondary-fixed": "#002114",
                      "on-secondary": "#ffffff",
                      "tertiary-fixed": "#ffdcc3",
                      "on-tertiary-fixed-variant": "#6e3900",
                      "inverse-on-surface": "#f0f1f2",
                      "outline": "#777587",
                      "background": "#f8f9fa",
                      "error-container": "#ffdad6",
                      "surface-container": "#edeeef",
                      "on-error-container": "#93000a",
                      "surface-container-low": "#f3f4f5",
                      "surface-tint": "#4d44e3",
                      "on-secondary-container": "#00714e",
                      "on-tertiary": "#ffffff",
                      "on-primary": "#ffffff",
                      "secondary": "#006c4a",
                      "on-primary-fixed": "#0f0069",
                      "primary-container": "#4f46e5",
                      "primary-fixed": "#e2dfff",
                      "surface": "#f8f9fa",
                      "surface-dim": "#d9dadb",
                      "secondary-fixed": "#85f8c4",
                      "on-tertiary-container": "#ffd2b1",
                      "on-surface-variant": "#464555",
                      "on-secondary-fixed-variant": "#005137",
                      "surface-container-highest": "#e1e3e4",
                      "primary-fixed-dim": "#c3c0ff",
                      "secondary-container": "#82f5c1",
                      "primary": "#3525cd",
                      "secondary-fixed-dim": "#68dba9",
                      "on-tertiary-fixed": "#2f1500",
                      "tertiary": "#703a00",
                      "surface-bright": "#f8f9fa",
                      "surface-container-lowest": "#ffffff",
                      "tertiary-fixed-dim": "#ffb77d",
                      "on-background": "#191c1d",
                      "surface-variant": "#e1e3e4",
                      "inverse-surface": "#2e3132"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "stack-lg": "32px",
                      "container-max-width": "1280px",
                      "margin-desktop": "48px",
                      "gutter": "24px",
                      "margin-mobile": "20px",
                      "unit": "4px",
                      "stack-md": "16px"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "label-md": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-sm": ["Inter"],
                      "headline-xl": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "14px", "fontWeight": "500"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-xl": ["40px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col relative overflow-hidden">
<!-- Top Navigation (Shell Implementation) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 py-4 bg-surface/80 backdrop-blur-md shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary cursor-pointer">arrow_back</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">분석 중</h1>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer">more_vert</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-20 pb-32 max-w-container-max-width mx-auto w-full relative">
<!-- Animated Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">

</div>
<!-- Central Progress Section -->
<div class="relative z-10 flex flex-col items-center mb-stack-lg">
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- SVG Progress Ring -->
<svg class="w-full h-full" viewBox="0 0 100 100">
<circle class="text-surface-container-highest" cx="50" cy="50" fill="transparent" r="44" stroke="currentColor" stroke-width="6"></circle>
<circle class="progress-ring__circle text-primary" cx="50" cy="50" fill="transparent" id="progress-circle" r="44" stroke="currentColor" stroke-dasharray="276.46" stroke-dashoffset="138.23" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Center Glass Morphism Card -->
<div class="absolute inset-4 rounded-full glass-morphism flex flex-col items-center justify-center shadow-xl border-white/50">
<span class="font-headline-xl text-headline-xl text-primary mb-1" id="percent-text">48%</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">AI Analysis</span>
</div>
<!-- Floating Decorative Chips -->
<div class="absolute -top-4 -right-4 glass-morphism px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce transition-all" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-xs font-bold text-secondary">AI Optimization</span>
</div>
</div>
<div class="text-center mt-stack-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">인테리어 최적화 분석</h2>
<p class="text-body-md text-on-surface-variant">공간의 잠재력을 AI가 정밀하게 파악하고 있습니다.</p>
</div>
</div>
<!-- Analysis Steps List -->
<div class="relative z-10 w-full max-w-md space-y-3">
<!-- Step 1: Completed -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-lowest border border-outline-variant/30 shadow-sm transition-all duration-500 opacity-100">
<div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center text-on-secondary shrink-0">
<span class="material-symbols-outlined text-[20px]">check</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-on-surface">구조 및 치수 분석 완료</p>
<p class="text-[11px] text-secondary font-medium">분석 데이터 서버 전송됨</p>
</div>
</div>
<!-- Step 2: Processing -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-white border-2 border-primary-container shadow-md transition-all duration-500 animate-pulse-soft">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shrink-0">
<span class="material-symbols-outlined animate-spin text-[20px]">refresh</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-primary">채광 및 조도 분석 중...</p>
<div class="w-full bg-surface-container h-1 rounded-full mt-2 overflow-hidden">
<div class="bg-primary h-full w-[60%] rounded-full"></div>
</div>
</div>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low/50 border border-outline-variant/20 opacity-60">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline-variant shrink-0">
<span class="material-symbols-outlined text-[18px]">more_horiz</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-on-surface-variant">생활 동선 분석 대기</p>
</div>
</div>
<!-- Step 4: Pending -->
<div class="flex items-center gap-4 p-4 rounded-xl bg-surface-container-low/50 border border-outline-variant/20 opacity-60">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant flex items-center justify-center text-outline-variant shrink-0">
<span class="material-symbols-outlined text-[18px]">more_horiz</span>
</div>
<div class="flex-grow">
<p class="font-label-md text-label-md text-on-surface-variant">맞춤형 스타일 추천 생성 대기</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface px-margin-mobile pt-6 pb-10 rounded-t-[32px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t border-outline-variant/20">
<div class="max-w-md mx-auto flex flex-col gap-4 text-center">
<p class="text-body-sm text-on-surface-variant px-4">
                분석 중에도 앱을 자유롭게 이용하세요.<br>
                완료되면 알림을 보내드릴게요.
            </p>
<div class="flex gap-3">
<button class="flex-grow h-14 rounded-xl bg-primary-container text-on-primary-container font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-primary-container/90 transition-colors shadow-sm">
<span class="material-symbols-outlined">notifications_active</span>
                    알림 설정 완료
                </button>
<button class="flex-grow h-14 rounded-xl bg-surface-container-highest text-on-surface font-label-md text-label-md flex items-center justify-center hover:bg-surface-container-high transition-colors">
                    메인으로 이동
                </button>
</div>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const circle = document.getElementById('progress-circle');
            const percentText = document.getElementById('percent-text');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            
            let progress = 48;
            function setProgress(percent) {
                const offset = circumference - (percent / 100 * circumference);
                circle.style.strokeDashoffset = offset;
                percentText.textContent = `${Math.round(percent)}%`;
            }

            // Simulate progress
            setInterval(() => {
                if (progress < 99) {
                    progress += Math.random() * 0.5;
                    setProgress(progress);
                }
            }, 300);

            setProgress(progress);
        });
    </script>
</body></html>
