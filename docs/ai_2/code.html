<script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('percent-text');
            const statusText = document.getElementById('status-text');
            
            const steps = [
                { percent: 30, text: '구조 분석 중...', stepId: 'step-1' },
                { percent: 65, text: '채광 분석 중...', stepId: 'step-2' },
                { percent: 95, text: '스타일 매칭 중...', stepId: 'step-3' },
                { percent: 100, text: '분석 완료!', stepId: null }
            ];

            let currentPercent = 0;
            let currentStepIdx = 0;

            const updateProgress = () => {
                if (currentPercent < 100) {
                    currentPercent += 1;
                    progressBar.style.width = `${currentPercent}%`;
                    percentText.innerText = `${currentPercent}%`;

                    // Check for step transitions
                    const currentStep = steps[currentStepIdx];
                    if (currentStep && currentPercent >= currentStep.percent - 5) {
                        statusText.innerText = currentStep.text;
                        if (currentStep.stepId) {
                            const stepEl = document.getElementById(currentStep.stepId);
                            stepEl.classList.remove('opacity-40');
                            stepEl.classList.add('opacity-100', 'step-enter');
                        }
                        if (currentPercent >= currentStep.percent) {
                            currentStepIdx++;
                        }
                    }

                    // Speed simulation
                    let speed = 100;
                    if (currentPercent > 40 && currentPercent < 70) speed = 150;
                    if (currentPercent > 90) speed = 300;

                    setTimeout(updateProgress, speed);
                } else {
                    // Final state interaction
                    statusText.innerText = "분석이 완료되었습니다!";
                    statusText.classList.add('text-secondary');
                    percentText.classList.add('text-secondary');
                    progressBar.classList.remove('bg-primary');
                    progressBar.classList.add('bg-secondary');
                }
            };

            setTimeout(updateProgress, 1000);
        });
    </script>
