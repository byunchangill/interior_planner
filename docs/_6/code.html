<span class="material-symbols-outlined">person</span>

<script>
        const cards = document.querySelectorAll('.select-card');
        const fab = document.getElementById('compare-fab');
        const countSpan = document.getElementById('selection-count');
        let selectedIds = new Set();

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.id;
                
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                    card.classList.remove('selected');
                    card.classList.remove('selected-card');
                } else {
                    selectedIds.add(id);
                    card.classList.add('selected');
                    card.classList.add('selected-card');
                }

                updateFab();
            });
        });

        function updateFab() {
            const count = selectedIds.size;
            countSpan.textContent = count;

            if (count >= 1) {
                fab.classList.remove('opacity-0', 'translate-y-4');
                fab.classList.add('opacity-100', 'translate-y-0');
            } else {
                fab.classList.add('opacity-0', 'translate-y-4');
                fab.classList.remove('opacity-100', 'translate-y-0');
            }
        }

        // Tab Switching Simulation
        const tabSaved = document.getElementById('tab-saved');
        const tabWishlist = document.getElementById('tab-wishlist');

        tabSaved.addEventListener('click', () => {
            tabSaved.classList.add('border-primary', 'text-primary');
            tabSaved.classList.remove('border-transparent', 'text-on-surface-variant');
            tabWishlist.classList.remove('border-primary', 'text-primary');
            tabWishlist.classList.add('border-transparent', 'text-on-surface-variant');
        });

        tabWishlist.addEventListener('click', () => {
            tabWishlist.classList.add('border-primary', 'text-primary');
            tabWishlist.classList.remove('border-transparent', 'text-on-surface-variant');
            tabSaved.classList.remove('border-primary', 'text-primary');
            tabSaved.classList.add('border-transparent', 'text-on-surface-variant');
        });
    </script>
