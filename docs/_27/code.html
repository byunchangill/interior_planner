<!-- Splash Screen Container -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center p-margin-mobile">
<!-- Animated Background Shader (AI Intelligence Layer) -->

<!-- Dynamic Ambient Blobs -->
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-primary opacity-5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary opacity-10 rounded-full blur-[100px]"></div>
<!-- Center Brand Cluster -->
<div class="relative z-10 flex flex-col items-center gap-stack-lg">
<!-- Icon/Logo Mark with Glassmorphism and Elevation -->
<div class="relative flex items-center justify-center w-32 h-32 md:w-40 md:h-40 rounded-[2rem] glass-effect shadow-[0_20px_50px_rgba(0,0,0,0.1)] animate-float">
<span class="material-symbols-outlined text-primary text-[64px] md:text-[80px]" style="font-variation-settings: 'FILL' 1;">
                    home_app_logo
                </span>
<!-- Orbiting AI Accent -->
<div class="absolute -top-2 -right-2 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full font-label-md text-label-md shadow-sm">
                    AI
                </div>
</div>
<!-- Typography & Slogan -->
<div class="text-center flex flex-col items-center">
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tighter mb-stack-sm">
                    HomeStyler
                </h1>
<div class="h-6 flex items-center justify-center">
<p class="font-body-lg text-body-lg text-on-surface-variant/80 tracking-wide">
                        AI로 완성하는 나만의 공간
                    </p>
</div>
</div>
</div>
<!-- Bottom Loading Indicator -->
<div class="absolute bottom-16 flex flex-col items-center gap-stack-md w-full max-w-[240px]">
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-0 transition-all duration-[3000ms] ease-out" id="progress-bar"></div>
</div>
<span class="font-label-sm text-label-sm text-outline animate-pulse">
                공간을 디자인하는 중...
            </span>
</div>
<!-- Visual Decorative Elements (Asymmetric Pattern) -->
<div class="absolute bottom-0 right-0 p-margin-desktop hidden md:block opacity-20 pointer-events-none">
<div class="grid grid-cols-2 gap-4">
<div class="w-16 h-16 bg-outline-variant rounded-xl"></div>
<div class="w-16 h-32 bg-primary rounded-xl mt-8"></div>
<div class="w-32 h-16 bg-secondary-container rounded-xl -ml-16"></div>
</div>
</div>
</main>
<!-- Background Decoration Image -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-[0.03]">
<div class="w-full h-full" data-alt="A sophisticated, high-end minimalist interior showroom with soft daylight filtering through floor-to-ceiling windows. The architectural lines are clean and modern, featuring premium materials like light oak wood and polished concrete. The overall aesthetic is professional and serene, utilizing a clean white and soft grey color palette that perfectly aligns with a modern design system. The lighting is ethereal and high-key, creating an atmosphere of creative empowerment." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAI10ZPWgkoHnAAl3oygH1DPXzRaZVrn5v-P6TDVg7_7R_cx-huAASWt1XCYwX38sohZZWnRzA_jJOQPc_5XQT1goJR5pIy3eqsz7CNI-DRC0ADxMYIWmHLSXk-8AbUClDbQZiVX6ZhnJGvsG1cMqonsXzIAJ6pmEI4A3xSEwgGH7tzOljBw2iT1A3y3nn7No3KWKZXCQE4OLtS7ldCe9vhJrrVyAIa9SYld4j9GeKyiPO10hJZz33Ts6jLe68bI9aGNQmFVSkBMdVV')"></div>
</div>
<script>
        // Progress bar simulation
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Subtle parallax/tilt effect for the logo mark
            const container = document.querySelector('main');
            const logo = document.querySelector('.animate-float');
            
            container.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateY(-10px)`;
            });

            container.addEventListener('mouseleave', () => {
                logo.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0px)`;
                logo.style.transition = 'all 0.5s ease';
            });

            container.addEventListener('mouseenter', () => {
                logo.style.transition = 'none';
            });
        });
    </script>
